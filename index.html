<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps Portal</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3250;
      --accent: #5c7cfa;
      --accent2: #38bdf8;
      --text: #e8eaf6;
      --muted: #8892b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(92, 124, 250, 0.12);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .card-title h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-title .stack {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      transition: color 0.15s, border-color 0.15s;
    }

    .github-link:hover {
      color: var(--text);
      border-color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <h1>Apps Portal</h1>
    <p>GitHub 公開アプリ・ツール一覧</p>
  </header>

  <div class="grid">

    <!-- fridge-menu-app -->
    <div class="card">
      <div class="card-header">
        <div class="icon" style="background:#0d1f2a;">🥗</div>
        <div class="card-title">
          <h2>Fridge Menu App</h2>
          <div class="stack">Python / Flask · Gemini API</div>
        </div>
      </div>
      <p class="card-desc">
        冷蔵庫の食材を入力すると、作れるメニューを AI が提案し
        レシピ検索 URL を表示する Web アプリ。
      </p>
      <div class="card-footer">
        <a class="github-link" href="https://github.com/mre-mre/fridge-menu-app" target="_blank">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>
    </div>

    <!-- schedule-uploader -->
    <div class="card">
      <div class="card-header">
        <div class="icon" style="background:#0d1a2a;">📅</div>
        <div class="card-title">
          <h2>Schedule Uploader</h2>
          <div class="stack">PWA · Gemini Vision · Google Calendar API</div>
        </div>
      </div>
      <p class="card-desc">
        学校の予定表を写真で撮影し、AI（Gemini Vision）で読み取って
        Google カレンダーに自動登録するスマホ向け PWA。
      </p>
      <div class="card-footer">
        <a class="github-link" href="https://github.com/mre-mre/schedule-uploader" target="_blank">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>
    </div>

  </div>

</body>
</html>
