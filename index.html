<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps Portal</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3250;
      --accent: #5c7cfa;
      --accent2: #38bdf8;
      --text: #e8eaf6;
      --muted: #8892b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(92, 124, 250, 0.12);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .card-title h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-title .stack {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

  </style>
</head>
<body>

  <header>
    <h1>Apps Portal</h1>
    <p>GitHub 公開アプリ・ツール一覧</p>
  </header>

  <div class="grid">

    <!-- fridge-menu-app -->
    <a class="card" href="https://github.com/mre-mre/fridge-menu-app" target="_blank">
      <div class="card-header">
        <div class="icon" style="background:#0d1f2a;">🥗</div>
        <div class="card-title">
          <h2>Fridge Menu App</h2>
          <div class="stack">Python / Flask · Gemini API</div>
        </div>
      </div>
      <p class="card-desc">
        冷蔵庫の食材を入力すると、作れるメニューを AI が提案し
        レシピ検索 URL を表示する Web アプリ。
      </p>
    </a>

    <!-- schedule-uploader -->
    <a class="card" href="https://github.com/mre-mre/schedule-uploader" target="_blank">
      <div class="card-header">
        <div class="icon" style="background:#0d1a2a;">📅</div>
        <div class="card-title">
          <h2>Schedule Uploader</h2>
          <div class="stack">PWA · Gemini Vision · Google Calendar API</div>
        </div>
      </div>
      <p class="card-desc">
        学校の予定表を写真で撮影し、AI（Gemini Vision）で読み取って
        Google カレンダーに自動登録するスマホ向け PWA。
      </p>
    </a>

  </div>

</body>
</html>
